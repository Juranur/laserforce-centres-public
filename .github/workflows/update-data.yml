name: Update Centre Data

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run fetch script
        run: node scripts/fetch-all-centres.mjs
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Check data was updated
        run: |
          echo "Checking if data file was modified..."
          if [ -f data/centres.json ]; then
            echo "Data file exists"
            echo "Last updated in file: $(cat data/centres.json | grep lastUpdated | head -1)"
          else
            echo "ERROR: Data file not found!"
            exit 1
          fi

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Commit and push
        run: |
          git add data/centres.json
          git diff --staged --quiet && echo "No changes to commit" || {
            git commit -m "Update centre data - $(date '+%Y-%m-%d %H:%M UTC')"
            git push
          }
