name: Update Centre Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fetch script
        run: node scripts/fetch-all-centres.mjs

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --exit-code data/centres.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/centres.json
          git commit -m "Update centre data - $(date '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: No changes detected
        if: steps.check-changes.outputs.has_changes != 'true'
        run: echo "No changes to commit"
